name: chongqing_university_thesis
description: 重庆大学普通本科毕业论文（设计）撰写规范化要求（2023年修订）

# ============================================================
# 页面设置
# ============================================================
page_margins_cm:
  top: 3.0        # 上边距30mm
  bottom: 2.5     # 下边距25mm
  left: 2.5       # 左边距25mm
  right: 2.5      # 右边距25mm
  gutter: 1.0     # 装订线10mm

# 页眉页脚距离（从纸张边缘到页眉/页脚的的距离）
header_distance_cm: 1.6   # 页眉16mm
footer_distance_cm: 1.5    # 页脚15mm

# 页眉设置
header:
  enabled: true                    # 是否启用页眉
  content_left: "重庆大学本科学生毕业论文（设计）"  # 单面印制左对齐内容
  content_center: "重庆大学本科学生毕业论文（设计）" # 双面印制居中内容
  font_name: 宋体
  font_size: 9.0                   # 小五号
  underline: true                  # 页眉下是否加下划线

# 页脚设置
footer:
  enabled: true
  page_number_position: CENTER     # 页码位置：CENTER/LEFT/RIGHT
  # 前置部分用罗马数字，其他部分用阿拉伯数字（需在应用中处理）

# ============================================================
# 字体与间距设置（全局默认值）
# ============================================================
default_fonts:
  chinese: 宋体
  western: Times New Roman
  heading: 黑体
line_spacing: 20                  # 固定值20磅
character_spacing: STANDARD        # 标准字间距

# ============================================================
# 标题格式
# ============================================================

# 一级标题（章）
# 黑体三号(16pt)，居中，段前空一行，段后空一行
h1:
  font_name: 黑体
  font_size: 16.0
  bold: true
  alignment: CENTER
  space_before: 0.0
  space_after: 0.0
  line_spacing: 20
  indent_first_line: 0.0
  page_break_before: true           # 章首页另起一页

# 二级标题（节）
# 黑体四号(14pt)，左对齐，段前空一行
h2:
  font_name: 黑体
  font_size: 14.0
  bold: true
  alignment: LEFT
  space_before: 0.0
  space_after: 0.0
  line_spacing: 20
  indent_first_line: 0.0

# 三级标题（小节）
# 宋体小四号(12pt)
h3:
  font_name: 宋体
  font_size: 12.0
  bold: true
  alignment: LEFT
  space_before: 0.0
  space_after: 0.0
  line_spacing: 20
  indent_first_line: 0.0

# 四级标题
# 宋体五号(10.5pt)
h4:
  font_name: 宋体
  font_size: 10.5
  bold: false
  alignment: LEFT
  space_before: 0.0
  space_after: 0.0
  line_spacing: 20
  indent_first_line: 0.0

# ============================================================
# 正文格式
# ============================================================
body:
  font_name: 宋体
  font_size: 10.5                  # 五号
  bold: false
  alignment: JUSTIFY
  space_before: 0.0
  space_after: 0.0
  line_spacing: 20
  indent_first_line: 21.0           # 首行缩进2字符（约21pt）

# ============================================================
# 图的格式
# ============================================================
figure:
  caption:
    font_name: 宋体
    font_size: 9.0                 # 五号
    alignment: CENTER
    position: BELOW                 # 图题在图下方
  # 图片宽度设置（cm）
  width:
    half: 8.5                      # 半版图 8-9cm
    two_thirds: 13.5               # 2/3版图 12-15cm
    full: 18.0                     # 全版图 17-19cm
  # 图片内文字字体大小
  label_font_size: 9.0

# ============================================================
# 表格格式
# ============================================================
table:
  caption:
    font_name: 宋体
    font_size: 9.0                 # 五号
    alignment: CENTER
    position: ABOVE                 # 表题在表上方
  style: THREE_LINE                # 三线表格式
  # 表内文字
  cell_font_size: 10.5

# ============================================================
# 数学公式格式
# ============================================================
equation:
  alignment: RIGHT                  # 序号居右
  font_name: Times New Roman
  font_size: 10.5

# ============================================================
# 脚注格式
# ============================================================
footnote:
  font_name: 宋体
  font_size: 9.0                   # 小五号
  separator_line: true              # 是否加分隔线
  separator_width: 0.25            # 分隔线占页面宽度比例（1/4=0.25）

# ============================================================
# 参考文献格式
# ============================================================
reference:
  font_name: 宋体
  font_size: 10.5
  alignment: JUSTIFY
  line_spacing: 20
  indent_first_line: 21.0           # 首行缩进2字符
  # 标点符号：英文半角（需在应用中处理）

# ============================================================
# 摘要格式
# ============================================================
abstract:
  font_name: 宋体
  font_size: 12.0                  # 小四号
  alignment: JUSTIFY
  line_spacing: 20
  indent_first_line: 21.0
  include_keywords: true            # 摘要包含关键词

# ============================================================
# 关键词格式
# ============================================================
keywords:
  font_name: 宋体
  font_size: 10.5
  separator: "；"                   # 分号分隔
  alignment: LEFT

# ============================================================
# 致谢格式
# ============================================================
acknowledgment:
  font_name: 宋体
  font_size: 10.5
  alignment: JUSTIFY
  line_spacing: 20
  indent_first_line: 21.0
  page_break_before: true           # 另起一页
