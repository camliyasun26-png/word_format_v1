<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Word 格式化工具</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 16px; background: #fafafa; }
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .tabs { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 0; }
  .tab-btn { padding: 8px 20px; cursor: pointer; border: none; background: #f0f0f0; font-size: 14px; }
  .tab-btn.active { background: #fff; border-bottom: 2px solid #1976d2; font-weight: bold; color: #1976d2; }
  .tab-panel { display: none; padding: 12px 0; }
  .tab-panel.active { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f5f5f5; }
  th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
  tr.low { background: #ffe0e0; }
  tr.medium { background: #fff8e1; }
  select { font-size: 13px; padding: 2px; }
  .page-wrap {
    background: #e0e0e0; padding: 24px 0; overflow: auto;
    display: flex; justify-content: center;
  }
  #preview-frame, #original-frame {
    width: 21cm; min-height: 29.7cm; box-sizing: border-box;
    padding: 2.54cm 3.17cm;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #original-frame img, #preview-frame img { max-width: 100%; height: auto; }
  .tab2-layout { display: flex; gap: 12px; align-items: flex-start; }
  #orig-nav, #prev-nav {
    width: 260px; flex-shrink: 0; max-height: calc(100vh - 160px);
    overflow: auto; background: #fff; border: 1px solid #ddd;
    border-radius: 4px; padding: 8px 4px; font-size: 13px;
    position: sticky; top: 8px;
  }
  #orig-nav .nav-title, #prev-nav .nav-title { font-weight: bold; padding: 4px 8px; color: #555; border-bottom: 1px solid #eee; margin-bottom: 4px; }
  #orig-nav .nav-item, #prev-nav .nav-item {
    cursor: pointer; padding: 3px 8px; border-radius: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #orig-nav .nav-item:hover, #prev-nav .nav-item:hover { background: #e3f2fd; color: #1976d2; }
  #orig-nav .nav-item.lvl-H1, #prev-nav .nav-item.lvl-H1 { font-weight: bold; padding-left: 8px; }
  #orig-nav .nav-item.lvl-H2, #prev-nav .nav-item.lvl-H2 { padding-left: 20px; }
  #orig-nav .nav-item.lvl-H3, #prev-nav .nav-item.lvl-H3 { padding-left: 32px; }
  #orig-nav .nav-item.lvl-H4, #prev-nav .nav-item.lvl-H4 { padding-left: 44px; color: #666; }
  #orig-nav .nav-item.lvl-H5, #prev-nav .nav-item.lvl-H5 { padding-left: 56px; color: #888; }
  #orig-nav .nav-empty, #prev-nav .nav-empty { color: #999; padding: 8px; }
  .tab2-layout .page-wrap { flex: 1; }
  .btn { padding: 8px 18px; background: #1976d2; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 14px; }
  .btn:disabled { background: #aaa; cursor: default; }
  .btn.danger { background: #d32f2f; }
  #status { font-size: 13px; color: #555; }
  label { font-size: 14px; }
  .preview-note { color: #d32f2f; font-size: 12px; margin: 4px 0; font-weight: bold; }
  .placeholder-row { text-align: center; margin: 10px 0; }
  .media-placeholder { display: inline-block; background: #e3f2fd; border: 1px solid #1976d2; color: #1976d2; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .media-placeholder:hover { background: #bbdefb; }
</style>
</head>
<body>

<div class="toolbar">
  <label>文件：<input type="file" id="file-input" accept=".doc,.docx"></label>
  <label>模板：<select id="template-select"></select></label>
  <button class="btn" id="upload-btn">上传解析</button>
  <button class="btn" id="export-btn" disabled>确认输出</button>
  <span id="status"></span>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="tab1">段落审核</button>
  <button class="tab-btn" data-tab="tab2">原文预览</button>
  <button class="tab-btn" data-tab="tab3">格式化预览</button>
</div>

<div id="tab1" class="tab-panel active">
  <table id="slice-table">
    <thead>
      <tr><th>#</th><th>原始文本</th><th>层级</th><th>置信度</th><th>命中规则</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<div id="tab2" class="tab-panel">
  <div class="tab2-layout">
    <div id="orig-nav"><div class="nav-title">导航 - 标题</div><div class="nav-empty">尚未加载文档</div></div>
    <div class="page-wrap"><div id="original-frame"></div></div>
  </div>
</div>
<div id="tab3" class="tab-panel">
  <div class="tab2-layout">
    <div id="prev-nav"><div class="nav-title">导航 - 标题</div><div class="nav-empty">尚未加载文档</div></div>
    <div class="page-wrap"><div id="preview-frame"></div></div>
  </div>
</div>

<script>
const LEVELS = ["H1","H2","H3","H4","H5","Body"];
let paragraphs = [];
let mediaAnchors = [];
let currentFile = null;
let currentDocId = null;
let currentFilename = null;
let currentTemplate = "report_cn.yaml";
let templateData = null;

const SESSION_KEY = "wordFormatSession";

function saveSession() {
  if (!currentDocId) return;
  try {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
      docId: currentDocId,
      filename: currentFilename,
      template: currentTemplate,
      paragraphs,
      mediaAnchors,
    }));
  } catch (e) { /* quota — ignore */ }
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
}

async function loadTemplateData() {
  try {
    const resp = await fetch("/template?name=" + encodeURIComponent(currentTemplate));
    templateData = await resp.json();
  } catch (e) { templateData = null; }
}

function styleNavItem(item, level) {
  if (!templateData) return;
  const cfg = templateData[level.toLowerCase()];
  if (!cfg) return;
  if (cfg.bold) item.style.fontWeight = "bold";
  else item.style.fontWeight = "normal";
  if (cfg.font_name) item.style.fontFamily = `'${cfg.font_name}',FangSong,serif`;
}

async function loadTemplates() {
  const resp = await fetch("/templates");
  const list = await resp.json();
  const sel = document.getElementById("template-select");
  sel.innerHTML = "";
  list.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    if (t === "report_cn.yaml") opt.selected = true;
    sel.appendChild(opt);
  });
  if (list.length > 0) currentTemplate = sel.value;
  await loadTemplateData();
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

document.getElementById("template-select").addEventListener("change", async e => {
  currentTemplate = e.target.value;
  await loadTemplateData();
  if (paragraphs.length > 0) { await refreshPreview(); buildOriginalNav(); }
});

document.getElementById("upload-btn").addEventListener("click", async () => {
  const fileInput = document.getElementById("file-input");
  if (!fileInput.files[0]) { alert("请选择文件"); return; }
  currentFile = fileInput.files[0];
  setStatus("解析中...");

  const fd = new FormData(); fd.append("file", currentFile);
  const uploadResp = await fetch("/upload", { method: "POST", body: fd });

  if (!uploadResp.ok) { setStatus("上传失败：" + await uploadResp.text()); return; }

  const data = await uploadResp.json();
  currentDocId = data.doc_id;
  currentFilename = data.filename;
  paragraphs = data.paragraphs;
  mediaAnchors = data.media_anchors || [];
  renderTable();

  document.getElementById("original-frame").innerHTML = data.original_html || "";
  annotateMediaNotes("original-frame");
  buildOriginalNav();

  await refreshPreview();
  document.getElementById("export-btn").disabled = false;
  saveSession();
  setStatus(`解析完成，共 ${paragraphs.length} 段`);
});

async function restoreSession() {
  let saved;
  try { saved = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null"); }
  catch (e) { saved = null; }
  if (!saved || !saved.docId) return false;

  setStatus("恢复会话中...");
  let resp;
  try { resp = await fetch("/session/" + encodeURIComponent(saved.docId)); }
  catch (e) { clearSession(); setStatus(""); return false; }
  if (!resp.ok) { clearSession(); setStatus(""); return false; }

  const data = await resp.json();
  currentDocId = data.doc_id;
  currentFilename = data.filename;
  // 恢复用户在 Tab1 上手动修改过的层级，但媒体锚点以服务端为准
  const serverParas = data.paragraphs;
  const savedByIdx = {};
  (saved.paragraphs || []).forEach(p => { if (p && p.index != null) savedByIdx[p.index] = p; });
  paragraphs = serverParas.map(p => {
    const s = savedByIdx[p.index];
    if (!s) return p;
    return { ...p,
      detected_level: s.detected_level || p.detected_level,
      is_split: s.is_split,
      split_title: s.split_title,
      split_body: s.split_body,
    };
  });
  mediaAnchors = data.media_anchors || [];
  if (saved.template) currentTemplate = saved.template;

  const sel = document.getElementById("template-select");
  if (sel) {
    Array.from(sel.options).forEach(o => { if (o.value === currentTemplate) o.selected = true; });
  }

  renderTable();
  document.getElementById("original-frame").innerHTML = data.original_html || "";
  annotateMediaNotes("original-frame");
  buildOriginalNav();
  await refreshPreview();
  document.getElementById("export-btn").disabled = false;
  saveSession();
  setStatus(`已恢复会话：${currentFilename}（共 ${paragraphs.length} 段）`);
  return true;
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function renderTable() {
  const tbody = document.querySelector("#slice-table tbody");
  tbody.innerHTML = "";
  paragraphs.forEach((p, i) => {
    const tr = document.createElement("tr");
    tr.className = p.confidence || "";
    const displayText = p.original_text.length > 80
      ? p.original_text.slice(0, 80) + "…" : p.original_text;
    const opts = LEVELS.map(l =>
      `<option value="${l}"${l === p.detected_level ? " selected" : ""}>${l}</option>`
    ).join("");
    tr.innerHTML = `
      <td>${i}</td>
      <td title="${escapeHtml(p.original_text)}">${escapeHtml(displayText)}</td>
      <td><select data-idx="${i}">${opts}</select></td>
      <td>${p.confidence || ""}</td>
      <td>${p.matched_rule || ""}</td>`;
    tbody.appendChild(tr);
  });

  document.querySelectorAll("#slice-table select").forEach(sel => {
    sel.addEventListener("change", async e => {
      const idx = parseInt(e.target.dataset.idx);
      const p = paragraphs[idx];
      p.detected_level = e.target.value;
      // 用户手动改层级即放弃自动拆分判定，避免预览仍按旧的标题/正文双段渲染
      if (p.is_split) {
        p.is_split = false;
        p.split_title = null;
        p.split_body = null;
      }
      saveSession();
      await refreshPreview();
      buildOriginalNav();
    });
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const PREVIEW_NOTE_TEXT = "【当前页面仅为预览 输出文件中的所有的表格和图片格式都采用原文格式】";

function annotateMediaNotes(rootId) {
  const root = document.getElementById(rootId);
  if (!root) return;
  root.querySelectorAll(".preview-note").forEach(n => n.remove());
  root.querySelectorAll("img, table").forEach(el => {
    const note = document.createElement("div");
    note.className = "preview-note";
    note.textContent = PREVIEW_NOTE_TEXT;
    el.parentNode.insertBefore(note, el);
  });
}

async function refreshPreview() {
  try {
    const items = [];
    const plan = paragraphs.map(p => {
      if (p.is_split && p.split_title && p.split_body) {
        const a = items.push({ text: p.split_title, level: p.detected_level }) - 1;
        const b = items.push({ text: p.split_body, level: "Body" }) - 1;
        return { kind: "split", a, b };
      }
      const a = items.push({ text: p.original_text, level: p.detected_level }) - 1;
      return { kind: "single", a };
    });
    const resp = await fetch("/preview/batch", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ items, template: currentTemplate })
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const { htmls } = await resp.json();
    const parts = plan.map((slot, idx) => {
      const inner = slot.kind === "split"
        ? htmls[slot.a] + "\n" + htmls[slot.b]
        : htmls[slot.a];
      return `<div class="para-slot" data-para-idx="${idx}">${inner}</div>`;
    });
    const frame = document.getElementById("preview-frame");
    frame.innerHTML = parts.join("\n");
    insertMediaPlaceholders(frame);
    buildPreviewNav();
  } catch (e) {
    console.error("refreshPreview failed:", e);
    setStatus("预览渲染失败: " + e.message);
    document.getElementById("preview-frame").innerHTML =
      `<div style="color:#d32f2f;padding:16px">预览渲染失败: ${escapeHtml(String(e && e.message || e))}</div>`;
  }
}

function insertMediaPlaceholders(frame) {
  const grouped = {};
  for (const a of mediaAnchors) {
    if (!grouped[a.after_para_index]) grouped[a.after_para_index] = [];
    grouped[a.after_para_index].push(a);
  }
  const makePlaceholderRow = list => {
    const row = document.createElement("div");
    row.className = "placeholder-row";
    list.forEach(a => {
      const label = a.kind === "image" ? "【图片】" : "【表格】";
      const span = document.createElement("span");
      span.className = "media-placeholder";
      span.textContent = label;
      span.dataset.target = a.id;
      span.title = "点击跳转到原文预览中的对应位置";
      span.addEventListener("click", () => jumpToMedia(a.id));
      span.style.marginRight = "8px";
      row.appendChild(span);
    });
    return row;
  };
  if (grouped[-1]) {
    frame.insertBefore(makePlaceholderRow(grouped[-1]), frame.firstChild);
  }
  frame.querySelectorAll(".para-slot").forEach(slot => {
    const idx = parseInt(slot.dataset.paraIdx);
    const list = grouped[idx];
    if (!list) return;
    slot.parentNode.insertBefore(makePlaceholderRow(list), slot.nextSibling);
  });
}

let previewNavMaxLevel = 4;

function buildPreviewNav() {
  const nav = document.getElementById("prev-nav");
  if (!nav) return;
  const headings = paragraphs
    .map((p, i) => ({ p, i }))
    .filter(x => x.p.detected_level && x.p.detected_level !== "Body");
  const deepest = headings.reduce((m, x) => {
    const n = parseInt(x.p.detected_level.slice(1));
    return isNaN(n) ? m : Math.max(m, n);
  }, 4);
  const maxOptions = [];
  for (let n = 4; n <= deepest; n++) maxOptions.push(n);
  if (previewNavMaxLevel > deepest) previewNavMaxLevel = deepest;

  nav.innerHTML = "";
  const titleWrap = document.createElement("div");
  titleWrap.className = "nav-title";
  titleWrap.style.display = "flex";
  titleWrap.style.alignItems = "center";
  titleWrap.style.gap = "6px";
  titleWrap.innerHTML = `<span>导航 - 标题</span>`;
  const sel = document.createElement("select");
  sel.style.fontSize = "12px";
  sel.style.marginLeft = "auto";
  maxOptions.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n; opt.textContent = "至 H" + n;
    if (n === previewNavMaxLevel) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener("change", e => {
    previewNavMaxLevel = parseInt(e.target.value);
    buildPreviewNav();
  });
  titleWrap.appendChild(sel);
  nav.appendChild(titleWrap);

  const shown = headings.filter(x => {
    const n = parseInt(x.p.detected_level.slice(1));
    return !isNaN(n) && n <= previewNavMaxLevel;
  });
  if (shown.length === 0) {
    const empty = document.createElement("div");
    empty.className = "nav-empty";
    empty.textContent = "无可显示的标题";
    nav.appendChild(empty);
    return;
  }
  shown.forEach(({ p, i }) => {
    const text = (p.is_split && p.split_title ? p.split_title : p.original_text).trim();
    const item = document.createElement("div");
    item.className = `nav-item lvl-${p.detected_level}`;
    item.textContent = text.length > 40 ? text.slice(0, 40) + "…" : text;
    item.title = `${p.detected_level}  ${text}`;
    styleNavItem(item, p.detected_level);
    item.addEventListener("click", () => {
      const target = document.querySelector(`#preview-frame .para-slot[data-para-idx="${i}"]`);
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
      const prev = target.style.background;
      target.style.background = "#fff59d";
      setTimeout(() => { target.style.background = prev; }, 1200);
    });
    nav.appendChild(item);
  });
}

function buildOriginalNav() {
  const nav = document.getElementById("orig-nav");
  nav.innerHTML = '<div class="nav-title">导航 - 标题</div>';
  const frame = document.getElementById("original-frame");
  if (!frame) return;
  const blocks = Array.from(frame.querySelectorAll("p, h1, h2, h3, h4, h5, h6, li"));
  const norm = s => (s || "").replace(/\s+/g, "").trim();
  const used = new Set();
  let count = 0;
  paragraphs.forEach((p, i) => {
    const lvl = p.detected_level;
    if (!lvl || lvl === "Body") return;
    const text = (p.original_text || "").trim();
    if (!text) return;
    const key = norm(text);
    let target = null;
    for (const el of blocks) {
      if (used.has(el)) continue;
      if (norm(el.textContent).indexOf(key.slice(0, 40)) !== -1) {
        target = el; break;
      }
    }
    if (target) used.add(target);
    const anchorId = `orig-nav-anchor-${i}`;
    if (target && !target.id) target.id = anchorId;
    const item = document.createElement("div");
    item.className = `nav-item lvl-${lvl}`;
    item.textContent = text.length > 40 ? text.slice(0, 40) + "…" : text;
    item.title = `${lvl}  ${text}`;
    styleNavItem(item, lvl);
    item.addEventListener("click", () => {
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
      const prev = target.style.background;
      target.style.background = "#fff59d";
      setTimeout(() => { target.style.background = prev; }, 1200);
    });
    nav.appendChild(item);
    count++;
  });
  if (count === 0) {
    const empty = document.createElement("div");
    empty.className = "nav-empty";
    empty.textContent = "未识别到标题";
    nav.appendChild(empty);
  }
}

function jumpToMedia(id) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelector('.tab-btn[data-tab="tab2"]').classList.add("active");
  document.getElementById("tab2").classList.add("active");
  const target = document.getElementById(id);
  if (target) {
    target.scrollIntoView({ behavior: "smooth", block: "center" });
    const prevOutline = target.style.outline;
    target.style.outline = "3px solid #ff9800";
    setTimeout(() => { target.style.outline = prevOutline; }, 1500);
  }
}

document.getElementById("export-btn").addEventListener("click", async () => {
  if (!currentDocId) { setStatus("会话已失效，请重新上传"); return; }
  setStatus("导出中...");
  const fd = new FormData();
  fd.append("doc_id", currentDocId);
  fd.append("paragraphs", JSON.stringify(paragraphs));
  fd.append("template", currentTemplate);
  const resp = await fetch("/export", {
    method: "POST",
    body: fd,
  });
  if (!resp.ok) {
    if (resp.status === 404) {
      clearSession();
      setStatus("会话已过期，请重新上传");
    } else {
      setStatus("导出失败");
    }
    return;
  }
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  const fname = currentFilename || "document.docx";
  a.download = fname.replace(/\.(doc|docx)$/i, "_formatted.$1");
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus("导出完成");
});

(async () => {
  await loadTemplates();
  await restoreSession();
})();
</script>
</body>
</html>
